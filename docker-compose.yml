services:
  newsnow:
    image: ghcr.io/ourongxing/newsnow:latest
    container_name: newsnow
    restart: always
    ports:
      - "4444:4444"
    environment:
      # GitHub OAuth 登录（可选），不需要登录功能可不填
      - G_CLIENT_ID=
      - G_CLIENT_SECRET=
      # JWT 密钥，随机字符串即可，如 openssl rand -base64 32 生成
      - JWT_SECRET=
      # 首次部署设为 true 以初始化数据库，初始化完成后改回 false 重启
      - INIT_TABLE=true
      # 开启缓存，推荐开启
      - ENABLE_CACHE=true
    volumes:
      # 持久化数据库文件（可选）
      - ./data:/app/data
